short_bio: >-
  <p>
    I am a Senior Software Engineer at Uber, working on large-scale systems and agentic engineering initiatives. 
    Previously, I was a Software Engineer at Google, where I led the development of the Topics API on Privacy Sandbox for Android 
    and developed end-to-end solutions for ML model training and prediction within Google TV's backend.
  </p>
  <p>
    I graduated with Honors in Computational Science from Dhirubhai Ambani Institute of Information and Communication Technology (DAIICT). 
    I am also passionate about competitive programming, having reached <strong>Candidate Master</strong> on Codeforces and ranked in the Top 50 in India on Hackerrank.
  </p>

