short_bio: >-
  <p>
    I'm <strong>Akshay</strong>, a Senior Software Engineer at <a href="https://www.uber.com" target="_blank">Uber</a>, 
    working on large-scale distributed systems and agentic engineering initiatives.
    Previously, I was a Software Engineer at <a href="https://www.google.com" target="_blank">Google</a>, where I led the development of the 
    <a href="https://developers.google.com/privacy-sandbox/private-advertising/topics/android" target="_blank">Topics API on Privacy Sandbox for Android</a>
    and built end-to-end ML model training and prediction pipelines within 
    <a href="https://tv.google" target="_blank">Google TV</a>'s backend.
    Before that, I was a Software Development Engineer at <a href="https://www.amazon.com" target="_blank">Amazon</a>.
  </p>
  <p>
    I graduated with Honors in Computational Science from 
    <a href="https://www.daiict.ac.in" target="_blank">Dhirubhai Ambani Institute of Information and Communication Technology (DAIICT)</a>.
    I'm passionate about competitive programming — I reached 
    <a href="https://codeforces.com/profile/akshay_miterani" target="_blank"><strong>Candidate Master</strong></a> on Codeforces
    and ranked in the <a href="https://www.hackerrank.com" target="_blank">Top 50 in India on HackerRank</a>.
  </p>

