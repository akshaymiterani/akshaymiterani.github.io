- question: "Many coders on Codeforces submit a problem within 2 minutes despite having a long problem description. How do they read the problem description?"
  url: "https://www.quora.com/Many-coders-on-Codeforces-submit-a-problem-within-2-minutes-despite-having-a-long-problem-description-How-do-they-read-the-problem-description/answer/Akshay-Miterani"
  snippet: "Ignore the story - Most of the times it is the initial part of the question, where a panda has to impress the villagers for a ritual. Although we all like pandas, after a while, you just become indifferent to helping those imaginary friends."
  upvotes: "646"
  views: "51.2K"
- question: "What perks do Amazon interns get?"
  url: "https://www.quora.com/What-perks-do-Amazon-interns-get/answer/Akshay-Miterani"
